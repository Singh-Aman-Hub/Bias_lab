    <!-- Google tag (gtag.js) — Set VITE_GA_MEASUREMENT_ID in .env to enable -->
    <script>
      (function() {
        var id = "__GA_DISABLED__";
        try { id = import.meta.env.VITE_GA_MEASUREMENT_ID; } catch(e) {}
        if (id && id.length > 4 && id.indexOf("GA") > -1) {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', id);
        }
      })();
    </script>
